name: format

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  run:
    name: format-check
    timeout-minutes: 10
    runs-on: ubuntu-latest
    container: ghcr.io/c-cube/c-cube-commmon/ci-5.4:latest
    steps:
      - uses: actions/checkout@v6
      - run: opam exec -- dune build @fmt
