name: build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  run:
    name: build  # build+test on various versions of OCaml, on linux
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        container:
          - ghcr.io/c-cube/c-cube-commmon/ci-5.1:latest
          - ghcr.io/c-cube/c-cube-commmon/ci-5.4:latest

    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v6
      - run: apt update
      - run: |
          curl -sSLo /tmp/hurl.deb \
            https://github.com/Orange-OpenSource/hurl/releases/download/7.1.0/hurl_7.1.0_amd64.deb
          apt-get install -y --no-install-recommends \
            libsqlite3-dev gnuplot-nox /tmp/hurl.deb
      - run: opam pin .#HEAD -y -n
      - run: opam pin https://github.com/c-cube/linol.git -y -n
      - run: opam install -t . --deps-only
      - run: opam exec -- dune build @all --ignore-promoted-rules
      - run: opam exec -- dune runtest -p benchpress
      # API integration tests: only on 5.4 (behaviour, not OCaml-version-sensitive)
      - if: matrix.container == 'ghcr.io/c-cube/c-cube-commmon/ci-5.4:latest'
        name: Run API integration tests
        run: |
          opam exec -- dune build \
            src/server/benchpress_server.exe \
            src/ctl/benchpressctl.exe
          cp _build/default/src/server/benchpress_server.exe /usr/local/bin/benchpress-server
          cp _build/default/src/ctl/benchpressctl.exe /usr/local/bin/benchpressctl
          bash docker/test-entrypoint.sh
