# docker compose -f docker/compose.test.yml up --build --abort-on-container-exit
# Exit code reflects the test runner's exit code.
services:
  server:
    build:
      context: ..
      dockerfile: Dockerfile.test
    image: benchpress-test
    # Override entrypoint: run the server only, test runner hits it over the network.
    entrypoint: ["benchpress-server", "serve",
                 "--port", "8083",
                 "--config", "/etc/benchpress/config.sexp"]
    environment:
      XDG_DATA_HOME: /data
      XDG_CONFIG_HOME: /config
    volumes:
      - server-data:/data
      - server-config:/config
      - bench-files:/tmp/bench
    configs:
      - source: benchpress_config
        target: /etc/benchpress/config.sexp
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8083/"]
      interval: 1s
      timeout: 3s
      retries: 30

  runner:
    build:
      context: ..
      dockerfile: Dockerfile.test
    image: benchpress-test
    entrypoint: ["/usr/local/bin/compose-test-runner.sh"]
    environment:
      SERVER_HOST: server
      PORT: "8083"
      XDG_DATA_HOME: /data
      XDG_CONFIG_HOME: /config
    volumes:
      - server-data:/data
      - server-config:/config
      - bench-files:/tmp/bench
    depends_on:
      server:
        condition: service_healthy

volumes:
  server-data:
  server-config:
  bench-files:

configs:
  benchpress_config:
    content: |
      (import-prelude false)

      (prover
        (name always-true)
        (cmd "/bin/true $file"))

      (prover
        (name slow)
        (cmd "sleep 30 && /bin/true $file"))

      (dir
        (path "/tmp/bench"))
