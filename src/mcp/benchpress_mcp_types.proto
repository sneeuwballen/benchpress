syntax = "proto3";
package benchpress_mcp;

// MCP Initialize response
message InitializeResult {
  string protocol_version = 1;
  ServerCapabilities capabilities = 2;
  ServerInfo server_info = 3;
}

message ServerCapabilities {
  ToolsCapability tools = 1;
}

message ToolsCapability {}

message ServerInfo {
  string name = 1;
  string version = 2;
}

// MCP Tool definition (for tools/list response)
message ToolDef {
  string name = 1;
  string description = 2;
  string input_schema_json = 3; // raw JSON schema string
}

message ToolsListResult {
  repeated ToolDef tools = 1;
}

// MCP Tool call result wrapper
message ToolCallResult {
  string content_json = 1;
}

// -- Benchpress tool response types --

message JobSummary {
  string file = 1;
  string uuid = 2;
  double timestamp = 3;
  int32 n_results = 4;
  int32 n_bad = 5;
  repeated string provers = 6;
  int32 size_bytes = 7;
}

message ListJobsResult {
  repeated JobSummary jobs = 1;
  int32 offset = 2;
  int32 limit = 3;
}

message ProverStat {
  string prover = 1;
  int32 sat = 2;
  int32 unsat = 3;
  int32 errors = 4;
  int32 timeout = 5;
  int32 unknown = 6;
  int32 memory = 7;
  int32 total = 8;
  double total_time = 9;
  double total_time_solved = 10;
}

message JobStatusResult {
  string file = 1;
  string uuid = 2;
  double timestamp = 3;
  double total_wall_time = 4;
  int32 n_results = 5;
  int32 n_bad = 6;
  bool is_complete = 7;
  repeated ProverStat provers = 8;
}

message ResultEntry {
  string prover = 1;
  string result = 2;
  double time_s = 3;
}

message ResultRow {
  string problem = 1;
  repeated ResultEntry results = 2;
}

message JobResultsResult {
  string file = 1;
  repeated string provers = 2;
  repeated ResultRow rows = 3;
  int32 n_rows = 4;
}

message QueryItem {
  string prover = 1;
  string problem = 2;
  string result = 3;
  string expected = 4;
  double time_s = 5;
}

message QueryJobResultsResult {
  string file = 1;
  int32 total = 2;
  int32 page = 3;
  int32 per_page = 4;
  bool is_complete = 5;
  repeated QueryItem items = 6;
}
