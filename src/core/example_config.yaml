# yaml-language-server: $schema=../data/config-schema.json
#
# Benchpress configuration file.
# Write as YAML (preferred) or JSON.
# Use 'benchpress check-config' to validate.

provers:
  # Minimal prover example
  - name: my-prover
    cmd: "$binary $file"
    sat: "^SAT"
    unsat: "^UNSAT"
    unknown: "^UNKNOWN"

  # Prover extending another (inherits all fields, overrides some)
  # - name: my-prover-v2
  #   extends: my-prover
  #   cmd: "$binary --incremental $file"
  #   timeout: "TIMEOUT"

  # Version examples
  # - name: z3
  #   cmd: "$binary $file"
  #   sat: "^sat"
  #   unsat: "^unsat"
  #   version: "4.8.10"                    # exact string
  #   version: { exact: "4.8.10" }         # same, explicit
  #   version: { git: /path/to/z3/repo }   # compute from git
  #   version: { cmd: "z3 --version" }     # run command

  # Prover with proof checking
  # - name: my-prover-with-proof
  #   cmd: "$binary $file $proof_file"
  #   sat: "^SAT"
  #   unsat: "^UNSAT"
  #   produces_proof: true
  #   proof_ext: drat
  #   proof_check:
  #     - checker: drat-trim
  #       when: result == "unsat"

# proof_checkers:
#   - name: drat-trim
#     cmd: "$cur_dir/drat-trim $file $proof_file"
#     valid: "s VERIFIED$"
#     invalid: "s NOT VERIFIED$"

dirs:
  - path: "$cur_dir/problems"
    pattern: '.*\.smt2$'

  # Expect examples
  # - path: /some/path
  #   expect: sat                          # all problems are SAT
  #   expect:                              # try methods in order
  #     try:
  #       - sat
  #       - run: z3                        # run prover to decide
  #   expect:                              # plain list = try
  #     - unknown
  #     - timeout

  # Directory inheritance
  # - name: qf
  #   extends: base-dir
  #   pattern: "*.qf_*.smt2"               # refine pattern
  #   expect: unsat                         # override expect

tasks:
  - name: all
    action:
      run_provers:
        provers: [my-prover]
        timeout: 30
        dirs: ["$cur_dir/problems"]

